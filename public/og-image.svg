<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(148,163,184,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow circles -->
  <circle cx="150" cy="150" r="280" fill="rgba(139,92,246,0.08)"/>
  <circle cx="1100" cy="520" r="220" fill="rgba(34,211,238,0.06)"/>

  <!-- Logo icon box -->
  <rect x="80" y="72" width="84" height="84" rx="20" fill="url(#logoGrad)"/>
  <!-- Logo arrow path -->
  <path d="M103 143C115 134 122 125 132 116C142 107 151 97 161 84" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M153 84H163V94" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="103" cy="143" r="5.5" fill="white"/>
  <circle cx="132" cy="116" r="5" fill="white" opacity="0.9"/>
  <circle cx="161" cy="84" r="5.5" fill="white"/>

  <!-- Brand name -->
  <text x="182" y="104" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold" fill="white" letter-spacing="-1">CareerGuide</text>
  <text x="182" y="147" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#a78bfa">India</text>

  <!-- Divider line -->
  <rect x="80" y="192" width="500" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="white" letter-spacing="-2">Career Guidance</text>
  <text x="80" y="368" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="url(#accent)" letter-spacing="-2">After 10th &amp; 12th</text>

  <!-- Subheadline -->
  <text x="80" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="rgba(148,163,184,0.9)">Step-by-step roadmaps · Entrance exams · Salary data</text>
  <text x="80" y="468" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="rgba(148,163,184,0.9)">40+ careers · 100% Free · Built for India</text>

  <!-- CTA badge -->
  <rect x="80" y="518" width="380" height="56" rx="14" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.5)" stroke-width="2"/>
  <text x="270" y="553" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#c4b5fd" font-weight="bold" text-anchor="middle">Visit career-guide-abdul.vercel.app</text>

  <!-- Right side decorative circles -->
  <circle cx="910" cy="195" r="62" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="2"/>
  <rect x="882" y="167" width="56" height="56" rx="12" fill="rgba(139,92,246,0.3)"/>
  <text x="910" y="210" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">BSc</text>

  <circle cx="1075" cy="315" r="58" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="2"/>
  <rect x="1047" y="287" width="56" height="56" rx="12" fill="rgba(99,102,241,0.3)"/>
  <text x="1075" y="325" font-family="Arial" font-size="22" fill="white" text-anchor="middle" font-weight="bold">Eng</text>

  <circle cx="895" cy="440" r="54" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.3)" stroke-width="2"/>
  <rect x="869" y="414" width="52" height="52" rx="12" fill="rgba(34,211,238,0.2)"/>
  <text x="895" y="448" font-family="Arial" font-size="20" fill="white" text-anchor="middle" font-weight="bold">Med</text>

  <circle cx="1080" cy="490" r="48" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="2"/>
  <rect x="1056" y="466" width="48" height="48" rx="12" fill="rgba(139,92,246,0.2)"/>
  <text x="1080" y="498" font-family="Arial" font-size="19" fill="white" text-anchor="middle" font-weight="bold">Law</text>

  <!-- Connecting lines -->
  <line x1="910" y1="257" x2="1017" y2="260" stroke="rgba(139,92,246,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1075" y1="373" x2="950" y2="386" stroke="rgba(99,102,241,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="895" y1="494" x2="1032" y2="490" stroke="rgba(34,211,238,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
</svg>
